name: Generate Snake

on:
  schedule:
    # Roda automaticamente todos os dias às 03:00 UTC (00:00 Horário de Brasília)
    - cron: "0 3 * * *"
  
  # Permite que você rode manualmente pela aba Actions
  workflow_dispatch:
  
  # Roda a cada atualização na branch principal
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # PASSO 1: Baixa o seu repositório na máquina virtual (Obrigatório antes de rodar o snk)
      - name: Checkout repository
        uses: actions/checkout@v4

      # PASSO 2: O seu código do Platane estruturado corretamente
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9&color_background=#aaaaaa

      # PASSO 3: Pega as fotos geradas na pasta "dist" e salva na branch "output"
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
