name: Generate-Snake

on:
  # Roda automaticamente a cada 12 horas
  schedule:
    # Roda às 03:00 UTC (00:00 no horário de Brasília)
    - cron: "0 3 * * *"
  
  # Permite que você rode o robô manualmente a qualquer momento
  workflow_dispatch:
  
  # Roda automaticamente sempre que você fizer um push na branch main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Gera a animação da cobrinha a partir do gráfico de contribuições
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Pega os arquivos gerados e salva em uma ramificação (branch) separada chamada "output"
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
